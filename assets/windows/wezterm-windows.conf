# Windows settings loaded from this file.
# Copy this file next to wezterm-gui.exe and edit values as needed.

# 1 = light, 0 = dark
AppsUseLightTheme=1

# 1 = use Windows accent color for focused top border, 0 = default border color
ColorPrevalence=0

# Mouse wheel scroll configuration
WheelScrollLines=3
WheelScrollChars=3

# Optional Terminal Services glass session id. 0 disables the fallback check.
GlassSessionId=0

# Optional extra environment variables for PTY children.
# SysEnv.PATH=C:\Tools
# Env.PATH=C:\Users\Name\bin
